<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Equalizer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script>
        function attachPan(chart, onPanMove) {
            const canvas = chart.canvas;
            let dragging = false, startX, startY, xMinS, xMaxS, yMinS, yMaxS;
            canvas.style.cursor = 'grab';
            canvas.addEventListener('mousedown', e => {
                if (e.button !== 0) return;
                dragging = true; startX = e.clientX; startY = e.clientY;
                xMinS = chart.scales.x.min; xMaxS = chart.scales.x.max;
                yMinS = chart.scales.y.min; yMaxS = chart.scales.y.max;
                canvas.style.cursor = 'grabbing'; e.preventDefault();
            });
            window.addEventListener('mousemove', e => {
                if (!dragging) return;
                const xs = chart.scales.x, ys = chart.scales.y;
                const xPx = xs.right - xs.left || 1, yPx = ys.bottom - ys.top || 1;
                const xR = xMaxS - xMinS, yR = yMaxS - yMinS;
                const dx = e.clientX - startX, dy = e.clientY - startY;
                chart.options.scales.x.min = xMinS - (dx / xPx) * xR;
                chart.options.scales.x.max = xMaxS - (dx / xPx) * xR;
                chart.options.scales.y.min = yMinS + (dy / yPx) * yR;
                chart.options.scales.y.max = yMaxS + (dy / yPx) * yR;
                chart.update('none');
                if (onPanMove) onPanMove(chart);
            });
            window.addEventListener('mouseup', () => {
                if (dragging) {
                    dragging = false;
                    canvas.style.cursor = 'grab';
                    if (onPanMove) onPanMove(chart);
                }
            });
            canvas.addEventListener('dblclick', () => {
                chart.options.scales.x.min = chart.options.scales.x.max =
                    chart.options.scales.y.min = chart.options.scales.y.max = undefined;
                chart.resetZoom();
                if (onPanMove) onPanMove(chart);
            });
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --bg0:#080b12;--bg1:#0d1117;--bg2:#131920;--bg3:#1a2230;
            --border:rgba(255,255,255,0.07);--accent:#00e5ff;--accent2:#7c4dff;
            --accent3:#ff4081;--text:#cdd6f4;--muted:#6c7a96;
            --green:#00e676;--yellow:#ffea00;--orange:#ff6d00;
        }
        body{font-family:'Oxanium',sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;padding:14px;
            background-image:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(0,229,255,0.04) 0%,transparent 60%),
            radial-gradient(ellipse 60% 40% at 80% 100%,rgba(124,77,255,0.04) 0%,transparent 60%);}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
        .header{text-align:center;margin-bottom:14px;}
        .header h1{font-size:1.9rem;font-weight:700;letter-spacing:.08em;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .header p{color:var(--muted);font-size:.78rem;font-family:'JetBrains Mono',monospace;margin-top:2px;}
        .top-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;margin-bottom:14px;background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:10px 16px;}
        .top-bar label{font-size:.8rem;color:var(--muted);}
        .mode-switcher{display:flex;gap:4px;background:var(--bg0);border:1px solid var(--border);border-radius:8px;padding:3px;}
        .mode-btn{padding:5px 13px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-family:'Oxanium',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
        .mode-btn:hover{color:var(--text);}
        .mode-btn.active{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;box-shadow:0 2px 10px rgba(0,229,255,.25);}
        .file-label{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:'Oxanium',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;}
        .file-label:hover{border-color:var(--accent);color:var(--accent);}
        .file-input{display:none;}
        .top-btn{padding:6px 13px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-family:'Oxanium',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;}
        .top-btn:hover{border-color:var(--accent2);color:var(--accent2);}
        .main-grid{display:grid;grid-template-columns:255px 1fr;gap:14px;max-width:1800px;margin:0 auto;}
        @media(max-width:900px){.main-grid{grid-template-columns:1fr;}}
        .panel{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:14px;}
        .slider-panel{position:sticky;top:14px;align-self:start;max-height:calc(100vh - 28px);overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
        .panel-title{font-size:.9rem;font-weight:700;color:var(--accent);letter-spacing:.05em;margin-bottom:4px;}
        .mode-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:700;letter-spacing:.08em;margin-left:6px;vertical-align:middle;}
        .badge-ecg{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3);}
        .badge-music{background:rgba(255,234,0,.12);color:var(--yellow);border:1px solid rgba(255,234,0,.3);}
        .badge-voices{background:rgba(255,64,129,.12);color:var(--accent3);border:1px solid rgba(255,64,129,.3);}
        .slider-group{display:flex;flex-direction:column;gap:5px;}
        .slider-label{font-size:.76rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
        .slider-label .val{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--accent);font-weight:600;}
        .slider-group input[type="range"]{width:100%;height:5px;border-radius:3px;background:var(--bg3);outline:none;-webkit-appearance:none;cursor:pointer;}
        .slider-group input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid var(--bg0);box-shadow:0 0 6px rgba(0,229,255,.4);}
        .slider-desc{font-size:.64rem;color:#3d4a5c;font-style:italic;line-height:1.4;}
        .transform-select{width:100%;padding:6px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg0);color:var(--text);font-family:'Oxanium',sans-serif;font-size:.8rem;cursor:pointer;}
        .transform-select option{background:var(--bg0);}
        .reset-btn{width:100%;padding:7px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-family:'Oxanium',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;}
        .reset-btn:hover{border-color:var(--accent2);color:var(--accent2);}
        .info-bar{font-size:.72rem;color:var(--muted);text-align:center;padding:5px;background:var(--bg0);border-radius:6px;font-family:'JetBrains Mono',monospace;}
        .viewers-area{display:flex;flex-direction:column;gap:12px;}
        .viewer-box{background:var(--bg1);border-radius:10px;padding:11px;border:1px solid var(--border);}
        .viewer-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
        .viewer-title{font-size:.85rem;font-weight:700;letter-spacing:.04em;}
        .chart-wrap{height:200px;position:relative;}
        .chart-wrap canvas{width:100%!important;height:100%!important;}
        .zoom-controls{position:absolute;top:4px;right:4px;z-index:10;display:flex;gap:3px;}
        .zoom-btn{width:25px;height:25px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:.85rem;cursor:pointer;transition:all .15s;line-height:1;}
        .zoom-btn:hover{background:var(--accent);border-color:var(--accent);color:#000;}
        .axis-btns{display:flex;gap:2px;margin-left:6px;padding-left:6px;border-left:1px solid var(--border);}
        .axis-btn{padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.65rem;cursor:pointer;transition:all .15s;font-family:'Oxanium',sans-serif;}
        .axis-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
        .playback-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
        .play-btn{padding:5px 12px;border:none;border-radius:7px;font-size:.9rem;cursor:pointer;transition:all .15s;color:#fff;font-family:'Oxanium',sans-serif;}
        .play-btn:hover{transform:scale(1.07);}
        .play-btn.play{background:#00c853;}
        .play-btn.pause{background:#ffc400;color:#000;}
        .play-btn.stop{background:#d50000;}
        .play-btn.reset-pb{background:linear-gradient(135deg,var(--accent2),var(--accent));}
        .pos-slider{flex:1;height:5px;border-radius:3px;background:var(--bg3);-webkit-appearance:none;cursor:pointer;min-width:60px;}
        .pos-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;}
        .speed-wrap{display:flex;align-items:center;gap:3px;}
        .speed-wrap label{font-size:.68rem;color:var(--muted);white-space:nowrap;}
        .speed-wrap input{width:55px;}
        .time-display{font-size:.75rem;color:var(--accent);min-width:100px;text-align:right;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
        .status-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:700;}
        .status-pill.playing{background:rgba(0,200,83,.15);color:#00e676;}
        .status-pill.paused{background:rgba(108,117,125,.15);color:var(--muted);}
        .status-pill.stopped{background:rgba(213,0,0,.15);color:#ff5252;}
        .audio-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-size:.72rem;cursor:pointer;transition:all .15s;font-family:'Oxanium',sans-serif;}
        .audio-btn:hover{border-color:var(--accent);color:var(--accent);}
        .audio-btn.playing{background:rgba(213,0,0,.12);border-color:#d50000;color:#ff5252;}
        .freq-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
        .freq-chart-wrap{height:280px;position:relative;}
        .scale-btns{display:flex;gap:3px;}
        .scale-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.72rem;cursor:pointer;transition:all .15s;font-family:'Oxanium',sans-serif;}
        .scale-btn.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}
        .spectro-toggle{padding:4px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-size:.76rem;cursor:pointer;transition:all .15s;font-family:'Oxanium',sans-serif;}
        .spectro-toggle:hover{border-color:var(--accent);color:var(--accent);}
        .spectro-toggle.active{background:rgba(0,229,255,.1);border-color:var(--accent);color:var(--accent);}
        .spectro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
        .spectro-box canvas{width:100%!important;height:180px!important;border-radius:6px;}
        .spectro-label{font-size:.7rem;color:var(--muted);margin-bottom:3px;}
        .section-label{font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:2px 0;border-bottom:1px solid var(--border);margin-bottom:2px;}
    </style>
</head>
<body>
<div class="header">
    <h1>⚡ SIGNAL EQUALIZER</h1>
    <p>scroll to zoom · drag to pan · double-click to reset view</p>
</div>

<div class="top-bar">
    <div class="mode-switcher">
        <button class="mode-btn active" onclick="switchMode('ecg',this)">🫀 ECG</button>
        <button class="mode-btn" onclick="switchMode('music',this)">🎸 Music</button>
        <button class="mode-btn" onclick="switchMode('voices',this)">🎤 Voices</button>
    </div>
    <label class="file-label" for="fileInput">
        📁 <span id="uploadLabelText">Upload ECG Signal</span>
        <input type="file" id="fileInput" class="file-input" accept=".csv,.dat,.wav,.mp3" onchange="loadFile(event)">
    </label>
    <label class="file-label" for="settingsInput">
        📥 Load Settings
        <input type="file" id="settingsInput" class="file-input" accept=".txt,.json" onchange="loadSettingsFile(event)">
    </label>
    <button class="top-btn" onclick="saveSettings()">💾 Save Settings</button>
</div>

<div class="main-grid">
    <!-- Left Slider Panel -->
    <div class="panel slider-panel">
        <div>
            <div class="panel-title">🎚️ Equalizer
                <span class="mode-badge badge-ecg" id="modeBadge">ECG</span>
            </div>
        </div>
        <div id="slidersContainer"></div>
        <div class="section-label" style="margin-top:4px;">Transform</div>
        <select id="transformSelect" class="transform-select" onchange="onTransformChange()">
            <option value="fourier">Fourier (FFT)</option>
            <option value="db4">Daubechies-4 (db4)</option>
            <option value="sym5">Symlet-5 (sym5)</option>
            <option value="coif3">Coiflet-3 (coif3)</option>
        </select>
        <button class="reset-btn" onclick="resetEqualizer()">↺ Reset Equalizer</button>
        <div class="info-bar" id="infoBar">No signal loaded</div>
    </div>

    <!-- Right Content -->
    <div class="viewers-area">
        <!-- Input Signal -->
        <div class="viewer-box">
            <div class="viewer-header">
                <span class="viewer-title" style="color:var(--accent);">📥 Input Signal</span>
                <button class="audio-btn" id="audioInBtn" onclick="toggleAudio('input')">🔊 Play Audio</button>
            </div>
            <div class="chart-wrap">
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomBoth(1.2)">+</button>
                    <button class="zoom-btn" onclick="zoomBoth(0.8)">−</button>
                    <button class="zoom-btn" onclick="resetZoom()">↺</button>
                    <div class="axis-btns" id="axisGroup">
                        <button class="axis-btn active" onclick="setZoomAxis('xy',this)">XY</button>
                        <button class="axis-btn" onclick="setZoomAxis('x',this)">X</button>
                        <button class="axis-btn" onclick="setZoomAxis('y',this)">Y</button>
                    </div>
                </div>
                <canvas id="inputChart"></canvas>
            </div>
        </div>

        <!-- Output Signal -->
        <div class="viewer-box">
            <div class="viewer-header">
                <span class="viewer-title" style="color:var(--green);">📤 Output Signal</span>
                <button class="audio-btn" id="audioOutBtn" onclick="toggleAudio('output')">🔊 Play Audio</button>
            </div>
            <div class="chart-wrap">
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomBoth(1.2)">+</button>
                    <button class="zoom-btn" onclick="zoomBoth(0.8)">−</button>
                    <button class="zoom-btn" onclick="resetZoom()">↺</button>
                </div>
                <canvas id="outputChart"></canvas>
            </div>
        </div>

        <!-- Playback Controls -->
        <div class="viewer-box" style="padding:9px 14px;">
            <div class="playback-bar">
                <button class="play-btn play"     onclick="play()">▶</button>
                <button class="play-btn pause"    onclick="pause()">⏸</button>
                <button class="play-btn stop"     onclick="stop()">⏹</button>
                <button class="play-btn reset-pb" onclick="resetPlayback()">↺</button>
                <input type="range" class="pos-slider" id="posSlider" min="0" max="100" value="0" oninput="setPosition(this.value)">
                <div class="speed-wrap">
                    <label>Speed:</label>
                    <input type="range" min="0.1" max="5" step="0.1" value="1" oninput="setSpeed(this.value)">
                    <span id="speedVal" style="color:var(--accent);font-size:.72rem;min-width:26px;font-family:'JetBrains Mono',monospace;">1×</span>
                </div>
                <div class="speed-wrap">
                    <label>Win(s):</label>
                    <input type="range" id="windowSlider" min="0.5" max="20" step="0.1" value="4" oninput="setWindowSize(this.value)">
                    <span id="windowVal" style="color:var(--accent2);font-size:.72rem;min-width:30px;font-family:'JetBrains Mono',monospace;">4.0s</span>
                </div>
                <div class="time-display">
                    <span class="status-pill stopped" id="statusPill">⏹ Stopped</span>
                    <div id="timeDisplay">0.00s / 0.00s</div>
                </div>
            </div>
        </div>

        <!-- Frequency Spectrum -->
        <div class="viewer-box">
            <div class="freq-header">
                <span class="viewer-title" style="color:var(--accent2);">📊 Frequency Spectrum</span>
                <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                    <div class="speed-wrap">
                        <label>Max Hz:</label>
                        <input type="range" id="freqWindowSlider" min="10" max="500" step="5" value="250" oninput="setFreqWindow(this.value)">
                        <span id="freqWindowVal" style="color:var(--accent2);font-size:.72rem;min-width:42px;font-family:'JetBrains Mono',monospace;">250 Hz</span>
                    </div>
                    <div class="scale-btns">
                        <button class="scale-btn active" onclick="setFreqScale('linear',this)">Linear</button>
                        <button class="scale-btn" onclick="setFreqScale('audiogram',this)">Audiogram</button>
                    </div>
                    <div style="display:flex;gap:3px;">
                        <button class="zoom-btn" style="position:static;" onclick="freqZoomIn()">+</button>
                        <button class="zoom-btn" style="position:static;" onclick="freqZoomOut()">−</button>
                        <button class="zoom-btn" style="position:static;" onclick="freqResetZoom()">↺</button>
                    </div>
                </div>
            </div>
            <div class="freq-chart-wrap">
                <canvas id="freqChart"></canvas>
            </div>
        </div>

        <!-- Spectrograms -->
        <div class="viewer-box">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                <span class="viewer-title" style="color:#ff9f43;">🌈 Spectrograms</span>
                <button class="spectro-toggle" id="spectroToggle" onclick="toggleSpectrograms()">Show Spectrograms</button>
            </div>
            <div class="spectro-grid" id="spectroGrid" style="display:none;">
                <div class="spectro-box">
                    <div class="spectro-label">Input Spectrogram</div>
                    <canvas id="spectroIn"></canvas>
                </div>
                <div class="spectro-box">
                    <div class="spectro-label">Output Spectrogram</div>
                    <canvas id="spectroOut"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/* ─────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────── */
let signalData=null, outputSignal=null, settings=null, gains=[];
let isPlaying=false, position=0, speed=1, animId=null, lastFrameTime=null;
let windowSize=2000, freqScale='linear', freqMaxHz=Infinity;
let cachedFreqs=null, cachedInMag=null, cachedOutMag=null;
let cachedIsWavelet=false, cachedLevelLabels=null;
let spectrogramsVisible=false, currentTransform='fourier', currentMode='ecg';
let audioPlaying={input:false,output:false};

/* ─────────────────────────────────────────────────────
   MODE DEFINITIONS
───────────────────────────────────────────────────── */
const MODES={
    ecg:{
        label:'ECG Abnormalities', badge:'ECG', badgeClass:'badge-ecg',
        uploadText:'Upload ECG Signal', fileAccept:'.csv,.dat,.wav,.mp3',
        settings:{mode:'ecg_abnormalities',sliders:[
            {name:'Normal Sinus Rhythm',description:'Normal heart rhythm components (P-wave, QRS complex, T-wave)',ranges:[[0.5,5],[5,15],[15,40]],default_gain:1.0,color:'#00e676'},
            {name:'Atrial Fibrillation',description:'Irregular atrial activity replacing P-waves with fibrillatory waves',ranges:[[4,9],[150,250],[300,500]],default_gain:1.0,color:'#ff4081'},
            {name:'Ventricular Tachycardia',description:'Wide QRS complexes with rapid ventricular rate',ranges:[[40,100],[100,250]],default_gain:1.0,color:'#ffea00'},
            {name:'Bradycardia',description:'Abnormally slow heart rate components',ranges:[[0.1,0.5],[0.5,2]],default_gain:1.0,color:'#7c4dff'}
        ]}
    },
    music:{
        label:'Musical Instruments', badge:'MUSIC', badgeClass:'badge-music',
        uploadText:'Upload Music Signal', fileAccept:'.csv,.dat,.wav,.mp3',
        settings:{mode:'musical_instruments',sliders:[
            {name:'Bass / Kick Drum',description:'Low-frequency bass guitar body and kick drum punch',ranges:[[20,60],[60,120],[120,200]],default_gain:1.0,color:'#ff6d00'},
            {name:'Guitar / Strings',description:'Mid-range guitar body, string harmonics and warmth',ranges:[[200,400],[400,800],[800,1600]],default_gain:1.0,color:'#ffea00'},
            {name:'Piano / Keys',description:'Piano attack transients and mid-to-high key harmonics',ranges:[[1600,3200],[3200,5000],[5000,7000]],default_gain:1.0,color:'#00e5ff'},
            {name:'Vocals / Presence',description:'Upper vocal presence range and air frequencies',ranges:[[7000,10000],[10000,14000],[14000,20000]],default_gain:1.0,color:'#ff4081'}
        ]}
    },
    voices:{
        label:'Human Voices', badge:'VOICES', badgeClass:'badge-voices',
        uploadText:'Upload Voice Recording', fileAccept:'.csv,.dat,.wav,.mp3',
        settings:{mode:'human_voices',sliders:[
            {name:'Male (Low / Bass)',description:'Deep male voice fundamentals and chest resonance',ranges:[[80,160],[160,300],[300,500]],default_gain:1.0,color:'#00b0ff'},
            {name:'Male (Tenor / Mid)',description:'Tenor and baritone upper harmonics and clarity',ranges:[[500,900],[900,1400],[1400,2000]],default_gain:1.0,color:'#ff6d00'},
            {name:'Female (Alto / Low)',description:'Alto and mezzo-soprano fundamentals and warmth',ranges:[[200,400],[400,700],[700,1200]],default_gain:1.0,color:'#00e676'},
            {name:'Female (Soprano / High)',description:'Soprano brightness, presence and upper harmonics',ranges:[[1200,2500],[2500,5000],[5000,8000]],default_gain:1.0,color:'#ff4081'}
        ]}
    }
};

/* ─────────────────────────────────────────────────────
   CHARTS INIT
───────────────────────────────────────────────────── */
function makeChartOpts(){
    return {
        responsive:true, maintainAspectRatio:false, animation:false,
        interaction:{mode:'nearest',intersect:false},
        plugins:{
            legend:{display:false},
            decimation:{enabled:true,algorithm:'lttb',samples:800,threshold:800},

function syncCharts(source,target){
    target.options.scales.x.min=source.scales.x.min;
    target.options.scales.x.max=source.scales.x.max;
    target.options.scales.y.min=source.scales.y.min;
    target.options.scales.y.max=source.scales.y.max;
    target.update('none');
}

outputChart.canvas.addEventListener('dblclick',()=>setTimeout(()=>syncCharts(outputChart,inputChart),50));

function switchMode(mode,btn){

/* ─────────────────────────────────────────────────────
   SETTINGS / SLIDERS
───────────────────────────────────────────────────── */
function loadDefaultSettings(){
    settings=JSON.parse(JSON.stringify(MODES[currentMode].settings));
    buildSliders();
}
function buildSliders(){
    if(!settings||!settings.sliders) return;
    const container=document.getElementById('slidersContainer');
    container.innerHTML=''; gains=[];
    if(settings.transform){currentTransform=settings.transform;document.getElementById('transformSelect').value=currentTransform;}
    settings.sliders.forEach((s,i)=>{
        const gv=s.current_gain!=null?s.current_gain:(s.default_gain||1.0);
        gains.push(gv);
        const color=s.color||'#00e5ff';
        const rangeStr=s.ranges.map(r=>`${r[0]}–${r[1]} Hz`).join(', ');
        container.innerHTML+=`
        <div class="slider-group">
            <div class="slider-label">
                <span style="color:${color};">● ${s.name}</span>
                <span class="val" id="gain-val-${i}">${gv.toFixed(2)}</span>
            </div>
            <input type="range" min="0" max="2" step="0.01" value="${gv}" style="accent-color:${color}" oninput="setGain(${i},this.value)">
            <div class="slider-desc">${s.description||''}<br><span style="color:#2a3548;">Freq: ${rangeStr}</span></div>
        </div>`;
    });
}
function setGain(index,value){
    gains[index]=parseFloat(value);
    document.getElementById(`gain-val-${index}`).textContent=parseFloat(value).toFixed(2);
    applyEqualization();
}
function resetEqualizer(){
    if(!settings||!settings.sliders) return;
    settings.sliders.forEach((s,i)=>{
        const def=s.default_gain||1.0;
        gains[i]=def;
        document.getElementById(`gain-val-${i}`).textContent=def.toFixed(2);
        const sliders=document.querySelectorAll('#slidersContainer .slider-group input[type="range"]');
        if(sliders[i]) sliders[i].value=def;
    });
    applyEqualization();
}

/* ─────────────────────────────────────────────────────
   FILE LOADING
───────────────────────────────────────────────────── */
async function loadFile(event){
    const file=event.target.files[0];
    if(!file) return;
    document.getElementById('infoBar').textContent='Loading...';
    const formData=new FormData();
    formData.append('file',file);
    try{
        const res=await fetch('/api/upload',{method:'POST',body:formData});
        const data=await res.json();
        if(data.success){signalData=data;outputSignal=[...data.signal];onSignalLoaded();}
        else document.getElementById('infoBar').textContent='Error: '+data.error;
    }catch(e){document.getElementById('infoBar').textContent='Upload failed: '+e.message;}
}
function onSignalLoaded(){
    const initSec=Math.min(2,signalData.duration);
    windowSize=Math.floor(signalData.sr*initSec);
    position=0;
    const ws=document.getElementById('windowSlider');
    const minW=Math.max(0.5,parseFloat((signalData.duration/40).toFixed(2)));
    ws.min=minW; ws.max=signalData.duration.toFixed(1); ws.value=initSec;
    document.getElementById('windowVal').textContent=initSec.toFixed(1)+'s';
    document.getElementById('posSlider').max=Math.max(0,signalData.n_samples-windowSize);
    document.getElementById('posSlider').value=0;
    document.getElementById('infoBar').textContent=`${signalData.sr} Hz · ${signalData.duration.toFixed(1)}s · ${signalData.n_samples} samples`;
    const nyquist=signalData.sr/2;
    const fws=document.getElementById('freqWindowSlider');
    fws.min=5; fws.max=nyquist; fws.step=Math.max(1,Math.round(nyquist/100)); fws.value=nyquist;
    freqMaxHz=nyquist;
    document.getElementById('freqWindowVal').textContent=nyquist+' Hz';
    updateViewers(); applyEqualization();
}
function setWindowSize(val){
    if(!signalData) return;
    const sec=parseFloat(val);
    windowSize=Math.min(Math.floor(signalData.sr*sec),signalData.n_samples);
    document.getElementById('windowVal').textContent=sec.toFixed(1)+'s';
    const posMax=Math.max(0,signalData.n_samples-windowSize);
    document.getElementById('posSlider').max=posMax;
    if(position>posMax){position=posMax;document.getElementById('posSlider').value=position;}
    updateViewers();
}

/* ─────────────────────────────────────────────────────
   EQUALIZATION
───────────────────────────────────────────────────── */
let eqTimeout=null;
function applyEqualization(){
    if(!signalData||!settings) return;
    clearTimeout(eqTimeout);
    eqTimeout=setTimeout(async()=>{
        try{
            const res=await fetch('/api/equalize',{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({gains,transform:currentTransform,sliders:settings.sliders})});
            const data=await res.json();
            if(data.success){
                outputSignal=data.output; updateViewers();
                updateFreqChart(data.is_wavelet?data.level_labels:data.frequencies,data.input_magnitude,data.output_magnitude,data.is_wavelet,data.level_labels);
                if(spectrogramsVisible) updateSpectrograms();
            }
        }catch(e){console.error('Equalization failed:',e);}
    },150);
}

/* ─────────────────────────────────────────────────────
   UPDATE VIEWERS (with full XY sync)
───────────────────────────────────────────────────── */
function updateViewers(){
    if(!signalData) return;
    const start=Math.floor(position);
    const end=Math.min(start+windowSize,signalData.n_samples);
    const inData=[],outData=[];
    const outSrc=outputSignal||signalData.signal;
    for(let i=start;i<end;i++){
        const x=signalData.time[i];
        inData.push({x,y:signalData.signal[i]});
        outData.push({x,y:outSrc[i]});
    }
    const xMin=signalData.time[start];
    const xMax=xMin+windowSize/signalData.sr;

    inputChart.data.datasets=[{label:'Input',data:inData,borderColor:'#00e5ff',borderWidth:1.5,pointRadius:0,fill:false,tension:0}];
    inputChart.options.scales.x.min=xMin; inputChart.options.scales.x.max=xMax;
    inputChart.update('none');

    outputChart.data.datasets=[{label:'Output',data:outData,borderColor:'#00e676',borderWidth:1.5,pointRadius:0,fill:false,tension:0}];
    outputChart.options.scales.x.min=xMin; outputChart.options.scales.x.max=xMax;
    outputChart.update('none');

    // Always enforce full Y+X sync after every data update
    syncCharts(inputChart,outputChart);
}

/* ── Frequency chart helpers ──────────────────────────────────────────────── */
function hexToRgba(hex, alpha){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
}

// Plugin: draw colored range bands clipped to chart area
const rangeBandPlugin={
    id:'rangeBands',
    beforeDatasetsDraw(chart){
        if(!chart._rangeBands||!chart._rangeBands.length) return;
        const {ctx,chartArea,scales:{x,y}}=chart;
        if(!x||!y||!chartArea) return;
        ctx.save();
        ctx.beginPath();
        ctx.rect(chartArea.left, chartArea.top, chartArea.width, chartArea.height);
        ctx.clip();
        chart._rangeBands.forEach(({lo,hi,color})=>{
            const x0=x.getPixelForValue(lo);
            const x1=x.getPixelForValue(hi);
            ctx.fillStyle=hexToRgba(color,0.14);
            ctx.fillRect(x0,chartArea.top,x1-x0,chartArea.height);
            ctx.strokeStyle=hexToRgba(color,0.45);
            ctx.lineWidth=1;
            ctx.beginPath();
            ctx.moveTo(x0,chartArea.top); ctx.lineTo(x0,chartArea.bottom);
            ctx.moveTo(x1,chartArea.top); ctx.lineTo(x1,chartArea.bottom);
            ctx.stroke();
        });
        ctx.restore();
    }
};
Chart.register(rangeBandPlugin);

function buildRangeBands(minHz, maxHz){
    if(!settings||!settings.sliders) return [];
    const bands=[];
    settings.sliders.forEach(s=>{
        s.ranges.forEach(r=>{
            const lo=Math.max(r[0],minHz), hi=Math.min(r[1],maxHz);
            if(lo<hi) bands.push({lo,hi,color:s.color||'#00e5ff'});
        });
    });
    return bands;
}

/* Destroy existing freqChart and rebuild fresh with given options */
function rebuildFreqChart(type, data, options){
    if(freqChart){ try{freqChart.destroy();}catch(e){} }
    freqChart=new Chart(document.getElementById('freqChart').getContext('2d'),{type,data,options});
    attachPan(freqChart);
}

function freqLineOpts(xType, xMin, xMax, xTickCb, xTitle){
    return {
        responsive:true, maintainAspectRatio:false, animation:false, parsing:false,
        plugins:{
            legend:{labels:{color:'#ccc',font:{size:10}}},
            zoom:{zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'xy',drag:{enabled:false}},pan:{enabled:false}}
        },
        scales:{
            x:{type:xType, min:xMin, max:xMax,
               grid:{color:'rgba(255,255,255,0.05)'},
               ticks:{color:'#6c7a96', callback:xTickCb, autoSkip:true, maxTicksLimit:12, maxRotation:0},
               title:{display:true, text:xTitle, color:'#6c7a96'}},
            y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#6c7a96'},title:{display:true,text:'Magnitude',color:'#6c7a96'}}
        }
    };
}

function updateFreqChart(freqs,inMag,outMag,isWavelet,levelLabels){
    if(!freqs||!freqs.length) return;
    cachedFreqs=freqs; cachedInMag=inMag; cachedOutMag=outMag;
    cachedIsWavelet=!!isWavelet; cachedLevelLabels=levelLabels||null;

    // ── Wavelet bar chart ──────────────────────────────────────────────────
    if(isWavelet){
        rebuildFreqChart('bar',
            {labels:levelLabels, datasets:[
                {label:'Input Magnitude',  data:inMag,  backgroundColor:'rgba(0,229,255,0.55)', borderColor:'#00e5ff',borderWidth:1,borderRadius:3},
                {label:'Output Magnitude', data:outMag, backgroundColor:'rgba(0,230,118,0.55)', borderColor:'#00e676',borderWidth:1,borderRadius:3}
            ]},
            {responsive:true,maintainAspectRatio:false,animation:false,
             plugins:{legend:{labels:{color:'#ccc',font:{size:10}}},zoom:{zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'xy'}}},
             scales:{
                 x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#aaa',font:{size:10},maxRotation:45,minRotation:20},title:{display:true,text:'Wavelet Level',color:'#6c7a96'}},
                 y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#6c7a96'},title:{display:true,text:'RMS Magnitude',color:'#6c7a96'},beginAtZero:true}
             }}
        );
        return;
    }

    // Determine display range
    const dataMaxHz = freqs[freqs.length-1];
    const dispMax   = Math.min(freqMaxHz===Infinity ? dataMaxHz : freqMaxHz, dataMaxHz);
    const dataMinHz = freqs[0] || 0;

    // Build {x,y} datasets filtered to display range
    function buildXY(mag){
        const pts=[];
        for(let i=0;i<freqs.length;i++){
            if(freqs[i]>dispMax) break;
            pts.push({x:freqs[i],y:mag[i]});
        }
        return pts;
    }
    const inD  = buildXY(inMag);
    const outD = buildXY(outMag);
    const lineData = {datasets:[
        {label:'Input',  data:inD,  borderColor:'#00e5ff',borderWidth:1.5,pointRadius:0,fill:false,tension:0},
        {label:'Output', data:outD, borderColor:'#00e676',borderWidth:1.5,pointRadius:0,fill:false,tension:0}
    ]};

    // ── Audiogram (log x-axis) ─────────────────────────────────────────────
    if(freqScale==='audiogram'){
        const logMin = Math.max(dataMinHz, 1);
        const logMax = dispMax;
        const allTicks=[1,2,5,10,20,50,100,200,500,1000,2000,5000,10000,20000];
        const visibleTicks=allTicks.filter(t=>t>=logMin&&t<=logMax);
        const opts=freqLineOpts(
            'logarithmic', logMin, logMax,
            v=> visibleTicks.includes(Number(v)) ? (v>=1000?(v/1000)+'kHz':v+' Hz') : '',
            'Frequency — Log/Audiogram Scale'
        );
        rebuildFreqChart('line', lineData, opts);
        freqChart._rangeBands=buildRangeBands(logMin, logMax);
        return;
    }

    // ── Linear ────────────────────────────────────────────────────────────
    const linMin = dataMinHz;
    const linMax = dispMax;
    const opts=freqLineOpts(
        'linear', linMin, linMax,
        v=> v>=1000?(v/1000).toFixed(1)+'k Hz': (v<10?v.toFixed(2):v.toFixed(0))+' Hz',
        'Frequency (Hz)'
    );
    rebuildFreqChart('line', lineData, opts);
    freqChart._rangeBands=buildRangeBands(linMin, linMax);
}

function setFreqScale(scale,btn){
    freqScale=scale;
    btn.parentElement.querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(cachedFreqs) updateFreqChart(cachedFreqs,cachedInMag,cachedOutMag,cachedIsWavelet,cachedLevelLabels);
    else applyEqualization();
}
function setFreqWindow(val){
    freqMaxHz=parseFloat(val);
    document.getElementById('freqWindowVal').textContent=freqMaxHz+' Hz';
    if(cachedFreqs) updateFreqChart(cachedFreqs,cachedInMag,cachedOutMag,cachedIsWavelet,cachedLevelLabels);
}

/* ─────────────────────────────────────────────────────
   SPECTROGRAMS
───────────────────────────────────────────────────── */
function toggleSpectrograms(){
    spectrogramsVisible=!spectrogramsVisible;
    const grid=document.getElementById('spectroGrid'),btn=document.getElementById('spectroToggle');
    grid.style.display=spectrogramsVisible?'grid':'none';
    btn.textContent=spectrogramsVisible?'Hide Spectrograms':'Show Spectrograms';
    btn.classList.toggle('active',spectrogramsVisible);
    if(spectrogramsVisible) updateSpectrograms();
}
async function updateSpectrograms(){
    if(!signalData) return;
    try{
        const[r1,r2]=await Promise.all([fetch('/api/spectrogram?which=input'),fetch('/api/spectrogram?which=output')]);
        const[d1,d2]=[await r1.json(),await r2.json()];
        if(d1.success) drawSpectrogram('spectroIn',d1);
        if(d2.success) drawSpectrogram('spectroOut',d2);
    }catch(e){console.error('Spectrogram error:',e);}
}
function drawSpectrogram(canvasId,data){
    const canvas=document.getElementById(canvasId),ctx=canvas.getContext('2d');
    const nF=data.frequencies.length,nT=data.times.length;
    const mL=50,mB=32,mT=4,mR=8;
    const dW=canvas.clientWidth||500,dH=canvas.clientHeight||180;
    canvas.width=dW; canvas.height=dH;
    const pW=dW-mL-mR,pH=dH-mT-mB;
    let gMin=Infinity,gMax=-Infinity;
    for(let f=0;f<nF;f++) for(let t=0;t<nT;t++){const v=data.magnitudes[f][t];if(v<gMin)gMin=v;if(v>gMax)gMax=v;}
    const range=gMax-gMin||1;
    const vir=[[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]];
    function vc(val){
        val=Math.max(0,Math.min(1,val));
        const idx=val*(vir.length-1),lo=Math.floor(idx),hi=Math.min(lo+1,vir.length-1),fr=idx-lo;
        return[Math.round(vir[lo][0]*(1-fr)+vir[hi][0]*fr),Math.round(vir[lo][1]*(1-fr)+vir[hi][1]*fr),Math.round(vir[lo][2]*(1-fr)+vir[hi][2]*fr)];
    }
    const ic=document.createElement('canvas');ic.width=nT;ic.height=nF;
    const ix=ic.getContext('2d'),id=ix.createImageData(nT,nF);
    for(let f=0;f<nF;f++) for(let t=0;t<nT;t++){
        const v=(data.magnitudes[nF-1-f][t]-gMin)/range,px=(f*nT+t)*4,c=vc(v);
        id.data[px]=c[0];id.data[px+1]=c[1];id.data[px+2]=c[2];id.data[px+3]=255;
    }
    ix.putImageData(id,0,0);
    ctx.fillStyle='#080b12';ctx.fillRect(0,0,dW,dH);
    ctx.drawImage(ic,mL,mT,pW,pH);
    ctx.fillStyle='#aaa';ctx.strokeStyle='#555';ctx.lineWidth=1;
    ctx.font='10px JetBrains Mono,monospace';ctx.textAlign='center';
    const tMin=data.times[0],tMax=data.times[data.times.length-1];
    for(let i=0;i<=5;i++){const fr=i/5,x=mL+fr*pW,tv=tMin+fr*(tMax-tMin);ctx.beginPath();ctx.moveTo(x,mT+pH);ctx.lineTo(x,mT+pH+3);ctx.stroke();ctx.fillText(tv.toFixed(1),x,mT+pH+13);}
    ctx.font='10px JetBrains Mono,monospace';ctx.textAlign='right';ctx.fillStyle='#aaa';
    const fMin=data.frequencies[0],fMax=data.frequencies[data.frequencies.length-1];
    for(let i=0;i<=4;i++){const fr=i/4,y=mT+pH-fr*pH,fv=fMin+fr*(fMax-fMin);ctx.beginPath();ctx.moveTo(mL,y);ctx.lineTo(mL-3,y);ctx.stroke();ctx.fillText(fv.toFixed(0),mL-5,y+3);}
    ctx.save();ctx.translate(11,mT+pH/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';ctx.font='10px JetBrains Mono,monospace';ctx.fillStyle='#6c7a96';ctx.fillText('Freq (Hz)',0,0);ctx.restore();
    ctx.fillStyle='#6c7a96';ctx.textAlign='center';ctx.font='10px JetBrains Mono,monospace';ctx.fillText('Time (s)',mL+pW/2,dH-2);
}

/* ─────────────────────────────────────────────────────
   PLAYBACK
───────────────────────────────────────────────────── */
function play(){
    if(!signalData) return;
    isPlaying=true; lastFrameTime=null;
    setPill('🔴 Playing','playing');
    animId=requestAnimationFrame(animate);
}
function pause(){
    isPlaying=false; lastFrameTime=null;
    setPill('⏸ Paused','paused');
    if(animId){cancelAnimationFrame(animId);animId=null;}
}
function stop(){
    isPlaying=false; lastFrameTime=null;
    if(animId){cancelAnimationFrame(animId);animId=null;}
    position=0;
    document.getElementById('posSlider').value=0;
    setPill('⏹ Stopped','stopped');
    updateViewers(); updateTimeDisplay();
}
function resetPlayback(){stop();resetZoom();}
function setPosition(val){position=parseInt(val);updateViewers();updateTimeDisplay();}
function setSpeed(val){speed=parseFloat(val);document.getElementById('speedVal').textContent=speed.toFixed(1)+'×';}
function setPill(text,cls){const p=document.getElementById('statusPill');p.textContent=text;p.className='status-pill '+cls;}
function animate(timestamp){
    if(!isPlaying||!signalData) return;
    if(lastFrameTime===null){lastFrameTime=timestamp;animId=requestAnimationFrame(animate);return;}
    const elapsed=(timestamp-lastFrameTime)/1000;
    lastFrameTime=timestamp;
    position+=elapsed*signalData.sr*speed;
    const maxPos=Math.max(0,signalData.n_samples-windowSize);
    if(position>=maxPos){position=0;lastFrameTime=null;}
    document.getElementById('posSlider').value=Math.floor(position);
    updateViewers(); updateTimeDisplay();
    animId=requestAnimationFrame(animate);
}
function updateTimeDisplay(){
    if(!signalData) return;
    document.getElementById('timeDisplay').textContent=`${(Math.floor(position)/signalData.sr).toFixed(2)}s / ${signalData.duration.toFixed(2)}s`;
}

/* ─────────────────────────────────────────────────────
   AUDIO
───────────────────────────────────────────────────── */
function toggleAudio(which){
    const btnId=which==='input'?'audioInBtn':'audioOutBtn';
    const btn=document.getElementById(btnId);
    if(audioPlaying[which]){
        audioPlaying[which].pause();
        audioPlaying[which]=false;
        btn.textContent='🔊 Play Audio'; btn.classList.remove('playing'); return;
    }
    btn.textContent='⏹ Stop Audio'; btn.classList.add('playing');
    const audio=new Audio(`/api/audio?which=${which}&t=${Date.now()}`);
    audioPlaying[which]=audio;
    audio.play();
    audio.onended=()=>{audioPlaying[which]=false;btn.textContent='🔊 Play Audio';btn.classList.remove('playing');};
}

/* ─────────────────────────────────────────────────────
   TRANSFORM
───────────────────────────────────────────────────── */
function onTransformChange(){
    currentTransform=document.getElementById('transformSelect').value;
    applyEqualization();
}

/* ─────────────────────────────────────────────────────
   SETTINGS SAVE / LOAD
───────────────────────────────────────────────────── */
function loadSettingsFile(event){
    const file=event.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{
        try{settings=JSON.parse(e.target.result);buildSliders();applyEqualization();}
        catch(err){alert('Invalid settings file: '+err.message);}
    };
    reader.readAsText(file); event.target.value='';
}
function saveSettings(){
    if(!settings){alert('No settings loaded.');return;}
    const toSave=JSON.parse(JSON.stringify(settings));
    toSave.sliders.forEach((s,i)=>{s.current_gain=gains[i];});
    toSave.transform=currentTransform;
    const blob=new Blob([JSON.stringify(toSave,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url; a.download=`${currentMode}_settings.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ─────────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────────── */
loadDefaultSettings();
